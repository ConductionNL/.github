name: Stable Release

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nextcloud app ID (must match appinfo/info.xml)"
        required: true
        type: string
      php-version:
        description: "PHP version for building"
        required: false
        type: string
        default: "8.3"
      node-version:
        description: "Node.js version for building"
        required: false
        type: string
        default: "18"
      verify-vendor-deps:
        description: "Enable vendor dependency verification after composer install"
        required: false
        type: boolean
        default: false
      vendor-check-paths:
        description: "Comma-separated vendor paths to verify exist (e.g. 'openai-php/client/src,theodo-group/llphant/src')"
        required: false
        type: string
        default: ""
      extra-rsync-excludes:
        description: "Additional rsync --exclude flags (one per line, e.g. '/data')"
        required: false
        type: string
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version calculation from PR labels ──

      - name: Get merged PR labels
        id: pr_label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the PR that was just merged (the merge commit on main)
          MERGE_SHA="${{ github.sha }}"

          # Query GitHub for PRs associated with this commit
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${MERGE_SHA}/pulls \
            --jq '.[0] | {number: .number, labels: [.labels[].name]}' 2>/dev/null || echo '{}')

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number // empty')
          echo "Merged PR: #${PR_NUMBER:-none}"

          # Determine bump level from labels (default: patch)
          BUMP="patch"
          LABELS=$(echo "$PR_DATA" | jq -r '.labels[]? // empty' 2>/dev/null)

          for label in $LABELS; do
            case "$label" in
              major) BUMP="major"; break ;;
              minor) BUMP="minor"; break ;;
              patch) BUMP="patch"; break ;;
            esac
          done

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Bump level: $BUMP"

      - name: Get latest version tag
        id: current_version
        run: |
          # Find latest stable version tag (vX.Y.Z without prerelease suffix)
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # Fallback: read from info.xml
            VERSION=$(grep -oP '(?<=<version>)[^<]+' appinfo/info.xml | sed 's/-.*//')
            echo "No git tags found, using info.xml baseline: $VERSION"
          else
            VERSION="${LATEST_TAG#v}"
            echo "Latest stable tag: $LATEST_TAG ($VERSION)"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next_version
        uses: actions-ecosystem/action-bump-semver@v1
        with:
          current_version: ${{ steps.current_version.outputs.version }}
          level: ${{ steps.pr_label.outputs.bump }}

      - name: Set version env
        run: |
          VERSION="${{ steps.next_version.outputs.new_version }}"
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_NAME=${{ inputs.app-name }}" >> $GITHUB_ENV
          echo "Releasing stable version: $VERSION"

      # ── Build ──

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: zip, gd

      - name: Install and build frontend
        run: |
          if [ -f "package.json" ]; then
            npm ci
            npm run build
          else
            echo "No package.json found, skipping frontend build"
          fi

      - name: Install composer dependencies
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-dev --optimize-autoloader --classmap-authoritative
          else
            echo "No composer.json found, skipping composer install"
          fi

      - name: Verify vendor dependencies
        if: inputs.verify-vendor-deps
        run: |
          echo "Checking critical vendor dependencies..."

          if [ ! -d "vendor" ] || [ -z "$(ls -A vendor 2>/dev/null)" ]; then
            echo "ERROR: vendor directory is missing or empty"
            exit 1
          fi

          IFS=',' read -ra PATHS <<< "${{ inputs.vendor-check-paths }}"
          missing=0
          for check_path in "${PATHS[@]}"; do
            check_path=$(echo "$check_path" | xargs) # trim whitespace
            if [ -n "$check_path" ] && [ ! -d "vendor/$check_path" ]; then
              echo "ERROR: vendor/$check_path not found"
              missing=1
            fi
          done

          if [ $missing -eq 1 ]; then
            echo "HINT: Check composer.json dependencies and composer install output"
            exit 1
          fi

          echo "✓ All critical dependencies verified"

      # ── Package ──

      - name: Copy files into package directory
        run: |
          mkdir -p package/${{ inputs.app-name }}
          rsync -a --progress \
            --exclude='/package' \
            --exclude='/.git' \
            --exclude='/.github' \
            --exclude='/.claude' \
            --exclude='/.cursor' \
            --exclude='/.vscode' \
            --exclude='/.nextcloud' \
            --exclude='/docker' \
            --exclude='/docker-compose.yml' \
            --exclude='/docs' \
            --exclude='/website' \
            --exclude='/node_modules' \
            --exclude='/src' \
            --exclude='/phpcs-custom-sniffs' \
            --exclude='/resources' \
            --exclude='/tests' \
            --exclude='/data' \
            --exclude='/package.json' \
            --exclude='/package-lock.json' \
            --exclude='/composer.json' \
            --exclude='/composer.lock' \
            --exclude='/composer-setup.php' \
            --exclude='/phpcs.xml' \
            --exclude='/phpmd.xml' \
            --exclude='/psalm.xml' \
            --exclude='/phpunit.xml' \
            --exclude='/phpunit-unit.xml' \
            --exclude='/.phpunit.cache' \
            --exclude='.phpunit.result.cache' \
            --exclude='/jest.config.js' \
            --exclude='/webpack.config.js' \
            --exclude='/tsconfig.json' \
            --exclude='/.babelrc' \
            --exclude='/.eslintrc.js' \
            --exclude='/.prettierrc' \
            --exclude='/stylelint.config.js' \
            --exclude='/.spectral.yml' \
            --exclude='/.gitignore' \
            --exclude='/.gitattributes' \
            --exclude='/.php-cs-fixer.dist.php' \
            --exclude='/.nvmrc' \
            --exclude='/changelog-ci-config.json' \
            --exclude='/coverage.txt' \
            --exclude='/signing-key.key' \
            --exclude='/signing-cert.crt' \
            --exclude='/openapi.json' \
            --exclude='/*_ANALYSIS.md' \
            --exclude='/*_FIX.md' \
            --exclude='/*_SUMMARY.md' \
            --exclude='/*_GUIDE.md' \
            --exclude='/CHANGELOG.md' \
            --exclude='/CONTRIBUTING.md' \
            ${{ inputs.extra-rsync-excludes }} \
            ./ package/${{ inputs.app-name }}/

      - name: Inject version into package info.xml
        run: |
          sed -i "s|<version>.*</version>|<version>${{ env.NEW_VERSION }}</version>|" \
            package/${{ inputs.app-name }}/appinfo/info.xml
          echo "Injected version ${{ env.NEW_VERSION }} into package info.xml"
          grep '<version>' package/${{ inputs.app-name }}/appinfo/info.xml

      - name: Verify package contents
        if: inputs.verify-vendor-deps
        run: |
          if [ ! -d "package/${{ inputs.app-name }}/vendor" ]; then
            echo "ERROR: vendor directory not found in package"
            exit 1
          fi

          IFS=',' read -ra PATHS <<< "${{ inputs.vendor-check-paths }}"
          for check_path in "${PATHS[@]}"; do
            check_path=$(echo "$check_path" | xargs)
            if [ -n "$check_path" ] && [ ! -d "package/${{ inputs.app-name }}/vendor/$check_path" ]; then
              echo "ERROR: vendor/$check_path not found in package"
              exit 1
            fi
          done

          echo "✓ Package vendor directory verified"

      # ── Sign & Release ──

      - name: Prepare signing credentials
        run: |
          echo "${{ secrets.NEXTCLOUD_SIGNING_KEY }}" > signing-key.key
          echo "${{ secrets.NEXTCLOUD_SIGNING_CERT }}" > signing-cert.crt

      - name: Create tarball
        run: |
          cd package && tar -czf ../nextcloud-release.tar.gz ${{ inputs.app-name }}

      - name: Sign tarball
        run: |
          openssl dgst -sha512 -sign signing-key.key nextcloud-release.tar.gz | openssl base64 -out nextcloud-release.signature

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.app-name }}-${{ env.NEW_VERSION }}
          path: |
            nextcloud-release.tar.gz
            nextcloud-release.signature
          retention-days: 90

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.NEW_VERSION }}
          name: Release ${{ env.NEW_VERSION }}
          draft: false
          prerelease: false
          generateReleaseNotes: true

      - name: Attach tarball to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          file: nextcloud-release.tar.gz
          asset_name: ${{ inputs.app-name }}-${{ env.NEW_VERSION }}.tar.gz
          tag: v${{ env.NEW_VERSION }}
          overwrite: true

      - name: Register and upload to Nextcloud App Store
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.NEW_VERSION }}/${{ inputs.app-name }}-${{ env.NEW_VERSION }}.tar.gz"

          # Check if app is registered
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://apps.nextcloud.com/api/v1/apps/${{ inputs.app-name }}")

          if [ "$HTTP_CODE" = "404" ]; then
            echo "App not registered — registering ${{ inputs.app-name }} on App Store..."

            SIGNATURE=$(echo -n "${{ inputs.app-name }}" | openssl dgst -sha512 -sign signing-key.key | openssl base64 -A)
            CERT_CONTENT=$(cat signing-cert.crt)

            REG_CODE=$(curl -s -o /tmp/register-response.json -w "%{http_code}" \
              -X POST "https://apps.nextcloud.com/api/v1/apps" \
              -H "Authorization: Token ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"certificate\": $(echo "$CERT_CONTENT" | jq -Rs .), \"signature\": \"$SIGNATURE\"}")

            if [ "$REG_CODE" = "200" ] || [ "$REG_CODE" = "201" ]; then
              echo "✓ App registered successfully"
            else
              echo "WARNING: Registration returned HTTP $REG_CODE"
              cat /tmp/register-response.json 2>/dev/null || true
            fi
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "✓ App already registered on App Store"
          else
            echo "WARNING: App Store lookup returned HTTP $HTTP_CODE (may be down)"
            echo "Will attempt release upload anyway..."
          fi

          # Sign the release tarball
          SIGNATURE=$(openssl dgst -sha512 -sign signing-key.key nextcloud-release.tar.gz | openssl base64 -A)

          # Upload the release
          echo "Uploading release to App Store (nightly: false)..."
          UPLOAD_CODE=$(curl -s -o /tmp/upload-response.json -w "%{http_code}" \
            -X POST "https://apps.nextcloud.com/api/v1/apps/releases" \
            -H "Authorization: Token ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"$DOWNLOAD_URL\", \"signature\": \"$SIGNATURE\", \"nightly\": false}")

          if [ "$UPLOAD_CODE" = "200" ] || [ "$UPLOAD_CODE" = "201" ]; then
            echo "✓ Release uploaded to App Store successfully"
          else
            echo "::warning::App Store upload returned HTTP $UPLOAD_CODE"
            cat /tmp/upload-response.json 2>/dev/null || true
            echo ""
            echo "The GitHub release was created successfully. The App Store upload can be retried manually."
            echo "App Store may be temporarily unavailable."
          fi

      - name: Verify release
        run: |
          echo "=== Stable Release Summary ==="
          echo "App: ${{ inputs.app-name }}"
          echo "Version: ${{ env.NEW_VERSION }}"
          echo "Tag: v${{ env.NEW_VERSION }}"
          echo ""
          echo "info.xml in tarball:"
          tar -xOf nextcloud-release.tar.gz ${{ inputs.app-name }}/appinfo/info.xml | grep '<version>'
          echo ""
          echo "Tarball size: $(du -h nextcloud-release.tar.gz | cut -f1)"

      - name: Clean up signing credentials
        if: always()
        run: rm -f signing-key.key signing-cert.crt
