name: Deploy docs.conduction.nl

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    uses: ./.github/workflows/documentation.yml
    with:
      cname: docs.conduction.nl
      source-folder: website
