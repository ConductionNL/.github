name: Quality

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nextcloud app ID (used for checkout path in NC server)"
        required: true
        type: string
      php-version:
        description: "Primary PHP version for linting and tests"
        required: false
        type: string
        default: "8.3"
      php-test-versions:
        description: "JSON array of PHP versions for PHPUnit matrix"
        required: false
        type: string
        default: '["8.3"]'
      nextcloud-ref:
        description: "Nextcloud server branch/tag to test against"
        required: false
        type: string
        default: "stable32"
      enable-psalm:
        description: "Run Psalm static analysis"
        required: false
        type: boolean
        default: true
      enable-phpstan:
        description: "Run PHPStan static analysis"
        required: false
        type: boolean
        default: true
      enable-phpmd:
        description: "Run PHPMD mess detection"
        required: false
        type: boolean
        default: true
      enable-phpcs:
        description: "Run PHPCS code style checks"
        required: false
        type: boolean
        default: true
      enable-phpmetrics:
        description: "Run phpmetrics code metrics"
        required: false
        type: boolean
        default: true
      enable-frontend:
        description: "Run frontend quality checks (ESLint + Stylelint)"
        required: false
        type: boolean
        default: true
      enable-eslint:
        description: "Run ESLint (requires enable-frontend)"
        required: false
        type: boolean
        default: true
      enable-phpunit:
        description: "Run PHPUnit tests against Nextcloud server"
        required: false
        type: boolean
        default: false
      enable-newman:
        description: "Run Newman integration tests against Nextcloud server"
        required: false
        type: boolean
        default: false
      newman-collection-path:
        description: "Path to Newman/Postman collection files (relative to app root)"
        required: false
        type: string
        default: "tests/integration"
      additional-apps:
        description: "JSON array of additional app repos to checkout and enable (e.g. '[{\"repo\":\"ConductionNL/openregister\",\"app\":\"openregister\"}]')"
        required: false
        type: string
        default: "[]"
      enable-license-check:
        description: "Run dependency license compliance check (composer + npm)"
        required: false
        type: boolean
        default: true
      enable-coverage-guard:
        description: "Run coverage baseline guard and auto-update"
        required: false
        type: boolean
        default: false

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: CVE Vulnerability Scanning
  # ──────────────────────────────────────────────
  cve-composer:
    runs-on: ubuntu-latest
    name: Composer Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Composer audit (high/critical)
        run: composer audit --format=plain --abandoned=report

  cve-npm:
    runs-on: ubuntu-latest
    name: npm Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: npm audit (critical only)
        run: npm audit --audit-level=critical --omit=dev

  # ──────────────────────────────────────────────
  # Stage 1: PHP Linting — each tool as a separate job
  # ──────────────────────────────────────────────
  lint-php:
    runs-on: ubuntu-latest
    name: PHP Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHP Lint
        run: composer lint

  lint-phpcs:
    if: ${{ inputs.enable-phpcs }}
    runs-on: ubuntu-latest
    name: PHPCS
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPCS
        run: |
          # Exit code 0 = clean, 1 = warnings only, 2 = errors found.
          # We treat warnings as non-blocking (exit 1 → success).
          composer phpcs; RC=$?
          if [ "$RC" -eq 1 ]; then
            echo "::warning::PHPCS found warnings but no errors — passing."
            exit 0
          fi
          exit $RC

  lint-phpmd:
    if: ${{ inputs.enable-phpmd }}
    runs-on: ubuntu-latest
    name: PHPMD
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPMD
        run: composer phpmd

  lint-psalm:
    if: ${{ inputs.enable-psalm }}
    runs-on: ubuntu-latest
    name: Psalm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run Psalm
        run: composer psalm

  lint-phpstan:
    if: ${{ inputs.enable-phpstan }}
    runs-on: ubuntu-latest
    name: PHPStan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPStan
        run: composer phpstan

  lint-phpmetrics:
    if: ${{ inputs.enable-phpmetrics }}
    runs-on: ubuntu-latest
    name: phpmetrics
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run phpmetrics
        run: composer phpmetrics

  # ──────────────────────────────────────────────
  # Stage 1: Frontend quality checks
  # ──────────────────────────────────────────────
  lint-eslint:
    if: ${{ inputs.enable-frontend && inputs.enable-eslint }}
    runs-on: ubuntu-latest
    name: ESLint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  lint-stylelint:
    if: ${{ inputs.enable-frontend }}
    runs-on: ubuntu-latest
    name: Stylelint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Stylelint
        run: npm run stylelint

  # ──────────────────────────────────────────────
  # Stage 1: License Compliance Check
  # ──────────────────────────────────────────────
  # Checks all composer and npm dependencies against an allowlist of approved
  # SPDX license identifiers. Generates a full license report as a workflow
  # artifact for audit/compliance purposes.
  #
  # Configuration (optional files in your app repo root):
  #
  #   .license-allowlist.json
  #   ─────────────────────────────────────────────
  #   A JSON array of approved SPDX license identifiers. If this file is
  #   absent, the built-in default allowlist is used (see step below).
  #   Example:
  #     ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
  #      "LGPL-2.1-only", "LGPL-2.1-or-later", "LGPL-3.0-only",
  #      "LGPL-3.0-or-later", "EUPL-1.2", "AGPL-3.0-or-later",
  #      "GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only",
  #      "GPL-3.0-or-later", "MPL-2.0", "Unlicense", "0BSD",
  #      "CC0-1.0", "CC-BY-3.0", "CC-BY-4.0", "PSF-2.0",
  #      "Zlib", "BlueOak-1.0.0"]
  #
  #   .license-overrides.json
  #   ─────────────────────────────────────────────
  #   A JSON object to manually approve specific packages even if their
  #   license is not on the allowlist. Use this for packages where:
  #   - The license is valid but uses a non-standard SPDX string
  #   - Legal has explicitly approved a specific dependency
  #   - The package is dual-licensed and the checker picks the wrong one
  #
  #   Keys are package names (composer: "vendor/package", npm: "package-name").
  #   Values are a justification string (who approved it and when).
  #   Example:
  #     {
  #       "vendor/some-package": "Approved by legal (Jan de Vries) — 2026-03-14, dual-licensed MIT/proprietary, we use MIT terms",
  #       "some-npm-package": "License is 'Artistic-2.0', compatible with EUPL — approved 2026-03-01"
  #     }
  #
  # How it works:
  #   1. Extracts all dependency licenses from composer and npm
  #   2. For dual-licensed packages ("MIT OR Apache-2.0"), passes if ANY
  #      license in the OR expression is on the allowlist
  #   3. Checks each package against overrides first, then the allowlist
  #   4. Generates a markdown + JSON report uploaded as a workflow artifact
  #   5. Fails the workflow if any dependency has a disallowed license
  # ──────────────────────────────────────────────
  license-check:
    if: ${{ inputs.enable-license-check }}
    runs-on: ubuntu-latest
    name: License Compliance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          composer install --no-progress --prefer-dist --optimize-autoloader
          npm ci
          npm install -g license-checker

      - name: Check licenses and generate report
        run: |
          set -euo pipefail

          # ── Default allowlist (EUPL-1.2 / AGPL-3.0 compatible) ──
          DEFAULT_ALLOWLIST='[
            "MIT", "ISC", "BSD-2-Clause", "BSD-3-Clause", "0BSD",
            "Apache-2.0",
            "LGPL-2.0-only", "LGPL-2.0-or-later",
            "LGPL-2.1-only", "LGPL-2.1-or-later",
            "LGPL-3.0-only", "LGPL-3.0-or-later",
            "GPL-2.0-only", "GPL-2.0-or-later",
            "GPL-3.0-only", "GPL-3.0-or-later",
            "AGPL-3.0-only", "AGPL-3.0-or-later",
            "EUPL-1.1", "EUPL-1.2",
            "MPL-2.0",
            "Unlicense", "CC0-1.0", "CC-BY-3.0", "CC-BY-4.0",
            "PSF-2.0", "Python-2.0", "Zlib", "BlueOak-1.0.0",
            "Artistic-2.0", "BSL-1.0", "WTFPL"
          ]'

          # Load repo allowlist or use default
          if [ -f .license-allowlist.json ]; then
            ALLOWLIST=$(cat .license-allowlist.json)
            echo "Using project .license-allowlist.json"
          else
            ALLOWLIST="$DEFAULT_ALLOWLIST"
            echo "No .license-allowlist.json found — using built-in default allowlist"
          fi

          # Load manual overrides
          if [ -f .license-overrides.json ]; then
            OVERRIDES=$(cat .license-overrides.json)
            echo "Loaded .license-overrides.json with $(echo "$OVERRIDES" | jq 'length') override(s)"
          else
            OVERRIDES='{}'
            echo "No .license-overrides.json found — no manual overrides"
          fi

          mkdir -p license-report

          # ── Helper: check if a license string is allowed ──
          # Handles SPDX OR expressions like "MIT OR Apache-2.0"
          # Strips trailing "*" from license-checker (means "guessed from README")
          # Strips surrounding parentheses from SPDX expressions
          check_license() {
            local license_str="$1"
            # Split on " OR " and check each part
            IFS='|' read -ra PARTS <<< "$(echo "$license_str" | sed 's/ OR /|/g; s/ or /|/g')"
            for part in "${PARTS[@]}"; do
              part=$(echo "$part" | sed 's/^ *//;s/ *$//' | sed 's/[()]//g' | sed 's/\*$//')
              if echo "$ALLOWLIST" | jq -e --arg l "$part" 'map(ascii_downcase) | index($l | ascii_downcase)' > /dev/null 2>&1; then
                return 0
              fi
            done
            return 1
          }

          VIOLATIONS=0
          REPORT_JSON='[]'

          # ── Composer dependencies ──
          echo ""
          echo "=== Checking Composer dependencies ==="
          COMPOSER_JSON=$(composer licenses --format=json 2>/dev/null || echo '{"dependencies":{}}')

          for pkg in $(echo "$COMPOSER_JSON" | jq -r '.dependencies | keys[]' 2>/dev/null); do
            license=$(echo "$COMPOSER_JSON" | jq -r --arg p "$pkg" '.dependencies[$p].license | join(" OR ")' 2>/dev/null)
            version=$(echo "$COMPOSER_JSON" | jq -r --arg p "$pkg" '.dependencies[$p].version' 2>/dev/null)

            # Check override first
            override=$(echo "$OVERRIDES" | jq -r --arg p "$pkg" '.[$p] // empty' 2>/dev/null)
            if [ -n "$override" ]; then
              status="approved-override"
              echo "  OVERRIDE: $pkg ($license) — $override"
            elif check_license "$license"; then
              status="approved"
            else
              status="DENIED"
              VIOLATIONS=$((VIOLATIONS + 1))
              echo "::error::Disallowed license: $pkg ($version) uses '$license'"
            fi

            REPORT_JSON=$(echo "$REPORT_JSON" | jq \
              --arg pkg "$pkg" \
              --arg ver "$version" \
              --arg lic "$license" \
              --arg st "$status" \
              --arg ovr "${override:-}" \
              --arg eco "composer" \
              '. + [{"package": $pkg, "version": $ver, "license": $lic, "status": $st, "override": $ovr, "ecosystem": $eco}]')
          done

          COMPOSER_COUNT=$(echo "$COMPOSER_JSON" | jq '.dependencies | length' 2>/dev/null || echo 0)
          echo "Checked $COMPOSER_COUNT Composer packages"

          # ── npm dependencies ──
          echo ""
          echo "=== Checking npm dependencies ==="
          NPM_JSON=$(license-checker --json --production 2>/dev/null || echo '{}')

          for pkg in $(echo "$NPM_JSON" | jq -r 'keys[]' 2>/dev/null); do
            # license-checker uses "licenses" (string or array)
            license=$(echo "$NPM_JSON" | jq -r --arg p "$pkg" '.[$p].licenses // .[$p].license // "UNKNOWN"' 2>/dev/null)
            # Extract package name without version (license-checker keys are "name@version")
            pkg_name=$(echo "$pkg" | sed 's/@[^@]*$//')
            pkg_version=$(echo "$pkg" | grep -oP '@[^@]+$' | sed 's/^@//')

            override=$(echo "$OVERRIDES" | jq -r --arg p "$pkg_name" '.[$p] // empty' 2>/dev/null)
            if [ -n "$override" ]; then
              status="approved-override"
              echo "  OVERRIDE: $pkg_name ($license) — $override"
            elif check_license "$license"; then
              status="approved"
            else
              status="DENIED"
              VIOLATIONS=$((VIOLATIONS + 1))
              echo "::error::Disallowed license: $pkg_name ($pkg_version) uses '$license'"
            fi

            REPORT_JSON=$(echo "$REPORT_JSON" | jq \
              --arg pkg "$pkg_name" \
              --arg ver "$pkg_version" \
              --arg lic "$license" \
              --arg st "$status" \
              --arg ovr "${override:-}" \
              --arg eco "npm" \
              '. + [{"package": $pkg, "version": $ver, "license": $lic, "status": $st, "override": $ovr, "ecosystem": $eco}]')
          done

          NPM_COUNT=$(echo "$NPM_JSON" | jq 'length' 2>/dev/null || echo 0)
          echo "Checked $NPM_COUNT npm packages"

          # ── Save JSON report ──
          echo "$REPORT_JSON" | jq '.' > license-report/license-report.json

          # ── Generate Markdown report ──
          TOTAL=$(echo "$REPORT_JSON" | jq 'length')
          APPROVED=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "approved")] | length')
          OVERRIDDEN=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "approved-override")] | length')
          DENIED=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "DENIED")] | length')

          cat > license-report/license-report.md << 'HEADER'
          # License Compliance Report

          **Generated:** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Repository:** ${{ github.repository }}
          **Ref:** ${{ github.sha }}

          HEADER

          # Fix the template variables (heredoc doesn't expand them)
          sed -i "s|\$(date -u +\"%Y-%m-%d %H:%M UTC\")|$(date -u +"%Y-%m-%d %H:%M UTC")|" license-report/license-report.md

          cat >> license-report/license-report.md << EOF

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total dependencies | $TOTAL |
          | Approved (allowlist) | $APPROVED |
          | Approved (manual override) | $OVERRIDDEN |
          | **Denied** | **$DENIED** |

          ## Composer Dependencies

          | Package | Version | License | Status | Override |
          |---------|---------|---------|--------|----------|
          EOF

          echo "$REPORT_JSON" | jq -r '.[] | select(.ecosystem == "composer") | "| \(.package) | \(.version) | \(.license) | \(.status) | \(.override) |"' >> license-report/license-report.md

          cat >> license-report/license-report.md << EOF

          ## npm Dependencies

          | Package | Version | License | Status | Override |
          |---------|---------|---------|--------|----------|
          EOF

          echo "$REPORT_JSON" | jq -r '.[] | select(.ecosystem == "npm") | "| \(.package) | \(.version) | \(.license) | \(.status) | \(.override) |"' >> license-report/license-report.md

          if [ "$DENIED" -gt 0 ]; then
            cat >> license-report/license-report.md << EOF

          ## Denied Dependencies

          The following dependencies use licenses not on the allowlist and have no manual override:

          | Package | Ecosystem | License |
          |---------|-----------|---------|
          EOF
            echo "$REPORT_JSON" | jq -r '.[] | select(.status == "DENIED") | "| \(.package) | \(.ecosystem) | \(.license) |"' >> license-report/license-report.md

            cat >> license-report/license-report.md << 'EOF'

          ### How to resolve

          Either:
          1. Add the license SPDX identifier to `.license-allowlist.json` if the license is generally acceptable
          2. Add the specific package to `.license-overrides.json` with a justification if only this package is approved

          See the workflow comments in quality.yml for configuration details.
          EOF
          fi

          # ── Summary output ──
          echo ""
          echo "════════════════════════════════════════"
          echo "License Check: $TOTAL total, $APPROVED approved, $OVERRIDDEN overridden, $DENIED denied"
          echo "════════════════════════════════════════"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS dependency license(s) are not on the allowlist. Add them to .license-allowlist.json or .license-overrides.json"
            exit 1
          fi

          echo "All dependency licenses are compliant."

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report/
          retention-days: 90

  # ──────────────────────────────────────────────
  # Stage 2: PHPUnit tests (needs NC server)
  # Gated behind linting + CVE.
  # ──────────────────────────────────────────────
  php-tests:
    if: ${{ inputs.enable-phpunit && !cancelled() && needs.lint-php.result != 'failure' && (needs.lint-phpcs.result == 'success' || needs.lint-phpcs.result == 'skipped') && needs.cve-composer.result != 'failure' && needs.cve-npm.result != 'failure' && (needs.lint-phpmd.result == 'success' || needs.lint-phpmd.result == 'skipped') }}
    runs-on: ubuntu-latest
    name: "PHPUnit (PHP ${{ matrix.php-version }})"
    needs: [lint-php, lint-phpcs, lint-phpmd, cve-composer, cve-npm]

    strategy:
      matrix:
        php-version: ${{ fromJSON(inputs.php-test-versions) }}
      fail-fast: false

    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: ${{ inputs.nextcloud-ref }}
          path: server

      - name: Checkout server submodules
        run: |
          cd server
          git submodule update --init 3rdparty

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: server/apps/${{ inputs.app-name }}

      - name: Checkout additional apps
        if: ${{ inputs.additional-apps != '[]' }}
        run: |
          echo '${{ inputs.additional-apps }}' | jq -c '.[]' | while read -r app; do
            repo=$(echo "$app" | jq -r '.repo')
            name=$(echo "$app" | jq -r '.app')
            ref=$(echo "$app" | jq -r '.ref // "main"')
            echo "Checking out $repo ($name) at $ref..."
            git clone --depth 1 --branch "$ref" "https://github.com/$repo.git" "server/apps/$name"
            if [ -f "server/apps/$name/composer.json" ]; then
              cd "server/apps/$name"
              composer install --no-progress --prefer-dist --optimize-autoloader --no-dev 2>/dev/null || true
              cd -
            fi
          done

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, sqlite3, zip, gd, curl, xml, json
          coverage: xdebug
          tools: composer:v2

      - name: Install Nextcloud
        run: |
          cd server
          php occ maintenance:install \
            --database sqlite \
            --admin-user admin \
            --admin-pass admin
          # Enable additional apps first (dependencies)
          if [ '${{ inputs.additional-apps }}' != '[]' ]; then
            echo '${{ inputs.additional-apps }}' | jq -r '.[].app' | while read -r name; do
              echo "Enabling app: $name"
              php occ app:enable "$name" || echo "::warning::Failed to enable $name, continuing..."
            done
          fi
          php occ app:enable ${{ inputs.app-name }}
          chmod -R a+w config

      - name: Install app dependencies
        run: |
          cd server/apps/${{ inputs.app-name }}
          composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Validate test infrastructure
        run: |
          cd server/apps/${{ inputs.app-name }}
          if [ ! -f phpunit.xml ] && [ ! -f phpunit-unit.xml ]; then
            echo "::error::PHPUnit is enabled but no phpunit.xml or phpunit-unit.xml found. Add a PHPUnit config or disable enable-phpunit."
            exit 1
          fi
          if [ ! -d tests/Unit ] && [ ! -d tests/unit ] && [ ! -d tests/Service ] && [ ! -d tests/Integration ] && [ ! -d tests/integration ]; then
            echo "::error::PHPUnit is enabled but no test directories found (tests/Unit, tests/Service, tests/Integration). Add tests or disable enable-phpunit."
            exit 1
          fi
          echo "PHPUnit infrastructure validated."

      - name: Run PHPUnit tests
        run: |
          cd server/apps/${{ inputs.app-name }}
          ./vendor/bin/phpunit \
            -c phpunit.xml \
            --colors=always \
            --coverage-clover=coverage/clover.xml

      - name: Guard coverage baseline
        if: inputs.enable-coverage-guard && matrix.php-version == inputs.php-version
        run: |
          cd server/apps/${{ inputs.app-name }}
          php scripts/coverage-guard.php coverage/clover.xml

      - name: Upload coverage artifact
        if: always() && matrix.php-version == inputs.php-version
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/apps/${{ inputs.app-name }}/coverage/
          retention-days: 14
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Stage 2: Newman API tests (needs running NC)
  # Gated behind linting + CVE.
  # ──────────────────────────────────────────────
  integration-tests:
    if: ${{ inputs.enable-newman && !cancelled() && needs.lint-php.result != 'failure' && (needs.lint-phpcs.result == 'success' || needs.lint-phpcs.result == 'skipped') && needs.cve-composer.result != 'failure' && needs.cve-npm.result != 'failure' && (needs.lint-phpmd.result == 'success' || needs.lint-phpmd.result == 'skipped') }}
    runs-on: ubuntu-latest
    name: Integration Tests (Newman)
    needs: [lint-php, lint-phpcs, lint-phpmd, cve-composer, cve-npm]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nextcloud
          POSTGRES_PASSWORD: nextcloud
          POSTGRES_DB: nextcloud
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: ${{ inputs.nextcloud-ref }}
          path: server

      - name: Checkout server submodules
        run: |
          cd server
          git submodule update --init 3rdparty

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: server/apps/${{ inputs.app-name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, pgsql, pdo_pgsql, zip, gd, curl, xml, json
          tools: composer:v2

      - name: Install Nextcloud
        run: |
          cd server
          php occ maintenance:install \
            --database pgsql \
            --database-host 127.0.0.1 \
            --database-port 5432 \
            --database-name nextcloud \
            --database-user nextcloud \
            --database-pass nextcloud \
            --admin-user admin \
            --admin-pass admin

      - name: Install and enable app
        run: |
          cd server/apps/${{ inputs.app-name }}
          composer install --no-progress --prefer-dist --optimize-autoloader
          cd ../../
          php occ app:enable ${{ inputs.app-name }}

      - name: Start PHP built-in server
        run: |
          cd server
          php -S 0.0.0.0:8080 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/status.php || echo "Server not ready"

      - name: Setup Node.js and Newman
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Validate Newman collections
        run: |
          cd server/apps/${{ inputs.app-name }}
          COLLECTION_PATH="${{ inputs.newman-collection-path }}"
          if [ ! -d "$COLLECTION_PATH" ]; then
            echo "::error::Newman is enabled but collection directory '$COLLECTION_PATH' does not exist. Add Postman collections or disable enable-newman."
            exit 1
          fi
          COLLECTIONS=$(find "$COLLECTION_PATH" -name "*.postman_collection.json" 2>/dev/null | wc -l)
          if [ "$COLLECTIONS" -eq 0 ]; then
            echo "::error::Newman is enabled but no .postman_collection.json files found in '$COLLECTION_PATH'. Add Postman collections or disable enable-newman."
            exit 1
          fi
          echo "Found $COLLECTIONS Postman collection(s) in $COLLECTION_PATH."

      - name: Run Newman tests
        run: |
          cd server/apps/${{ inputs.app-name }}/${{ inputs.newman-collection-path }}
          FAIL=0
          for collection in *.postman_collection.json; do
            echo ""
            echo "=== Running: $collection ==="
            newman run "$collection" \
              --env-var "base_url=http://localhost:8080" \
              --env-var "admin_user=admin" \
              --env-var "admin_password=admin" \
              --reporters cli || FAIL=1
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more Newman collections failed."
            exit 1
          fi

      - name: Show Nextcloud log on failure
        if: failure()
        run: |
          echo "=== Last 50 lines of Nextcloud log ==="
          tail -50 server/data/nextcloud.log 2>/dev/null | python3 -m json.tool --no-ensure-ascii 2>/dev/null || tail -50 server/data/nextcloud.log 2>/dev/null || echo "No log found"

  # ──────────────────────────────────────────────
  # Guard: Block PRs that manually edit .coverage-baseline
  # ──────────────────────────────────────────────
  baseline-protection:
    if: ${{ inputs.enable-coverage-guard && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    name: Coverage Baseline Protection

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for manual baseline changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^\.coverage-baseline$'; then
            echo "::error::Manual changes to .coverage-baseline are not allowed. The baseline is updated automatically when coverage improves."
            exit 1
          fi
          echo "No manual baseline changes detected."

  # ──────────────────────────────────────────────
  # Auto-update: Ratchet baseline on push to main/development
  # ──────────────────────────────────────────────
  update-baseline:
    if: ${{ inputs.enable-coverage-guard && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development') }}
    runs-on: ubuntu-latest
    name: Update Coverage Baseline
    needs: php-tests
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}

      - name: Update baseline if improved
        run: php scripts/coverage-guard.php coverage/clover.xml --update-baseline

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .coverage-baseline; then
            echo "Baseline unchanged, nothing to commit."
          else
            git add .coverage-baseline
            git commit -m "ci: update coverage baseline [skip ci]"
            git push
          fi

  # ──────────────────────────────────────────────
  # Summary: Report results
  # ──────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    name: Quality Summary
    needs: [cve-composer, cve-npm, lint-php, lint-phpcs, lint-phpmd, lint-psalm, lint-phpstan, lint-phpmetrics, lint-eslint, lint-stylelint, license-check, php-tests, integration-tests, baseline-protection]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "Composer Audit:${{ needs.cve-composer.result }}" \
                       "npm Audit:${{ needs.cve-npm.result }}" \
                       "PHP Lint:${{ needs.lint-php.result }}" \
                       "PHPCS:${{ needs.lint-phpcs.result }}" \
                       "PHPMD:${{ needs.lint-phpmd.result }}" \
                       "Psalm:${{ needs.lint-psalm.result }}" \
                       "PHPStan:${{ needs.lint-phpstan.result }}" \
                       "phpmetrics:${{ needs.lint-phpmetrics.result }}" \
                       "ESLint:${{ needs.lint-eslint.result }}" \
                       "Stylelint:${{ needs.lint-stylelint.result }}" \
                       "License Compliance:${{ needs.license-check.result }}" \
                       "PHPUnit:${{ needs.php-tests.result }}" \
                       "Newman:${{ needs.integration-tests.result }}" \
                       "Coverage Baseline:${{ needs.baseline-protection.result }}"; do
            name="${check%%:*}"
            result="${check##*:}"
            case "$result" in
              success) icon="+" ;;
              skipped) icon="-" ;;
              *) icon="x" ;;
            esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Composer Audit': '${{ needs.cve-composer.result }}',
              'npm Audit': '${{ needs.cve-npm.result }}',
              'PHP Lint': '${{ needs.lint-php.result }}',
              'PHPCS': '${{ needs.lint-phpcs.result }}',
              'PHPMD': '${{ needs.lint-phpmd.result }}',
              'Psalm': '${{ needs.lint-psalm.result }}',
              'PHPStan': '${{ needs.lint-phpstan.result }}',
              'phpmetrics': '${{ needs.lint-phpmetrics.result }}',
              'ESLint': '${{ needs.lint-eslint.result }}',
              'Stylelint': '${{ needs.lint-stylelint.result }}',
              'License Compliance': '${{ needs.license-check.result }}',
              'PHPUnit Tests': '${{ needs.php-tests.result }}',
              'Integration Tests': '${{ needs.integration-tests.result }}',
              'Coverage Baseline': '${{ needs.baseline-protection.result }}'
            };

            const icon = (s) => s === 'success' ? 'PASS' : s === 'skipped' ? 'SKIP' : 'FAIL';

            let body = '## Quality Report\n\n';
            body += '| Check | Result |\n|-------|--------|\n';
            for (const [name, result] of Object.entries(jobs)) {
              body += `| ${name} | ${icon(result)} ${result} |\n`;
            }
            body += '\nSee [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
