name: Quality

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nextcloud app ID (used for checkout path in NC server)"
        required: true
        type: string
      php-version:
        description: "Primary PHP version for linting and tests"
        required: false
        type: string
        default: "8.3"
      php-test-versions:
        description: "JSON array of PHP versions for PHPUnit matrix"
        required: false
        type: string
        default: '["8.3"]'
      nextcloud-ref:
        description: "Nextcloud server branch/tag to test against"
        required: false
        type: string
        default: "stable32"
      enable-psalm:
        description: "Run Psalm static analysis"
        required: false
        type: boolean
        default: true
      enable-phpstan:
        description: "Run PHPStan static analysis"
        required: false
        type: boolean
        default: true
      enable-phpmetrics:
        description: "Run phpmetrics code metrics"
        required: false
        type: boolean
        default: true
      enable-frontend:
        description: "Run frontend quality checks (ESLint + Stylelint)"
        required: false
        type: boolean
        default: true
      enable-eslint:
        description: "Run ESLint (requires enable-frontend)"
        required: false
        type: boolean
        default: true
      enable-phpunit:
        description: "Run PHPUnit tests against Nextcloud server"
        required: false
        type: boolean
        default: false
      enable-newman:
        description: "Run Newman integration tests against Nextcloud server"
        required: false
        type: boolean
        default: false
      enable-coverage-guard:
        description: "Run coverage baseline guard and auto-update"
        required: false
        type: boolean
        default: false

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: CVE Vulnerability Scanning
  # ──────────────────────────────────────────────
  cve:
    runs-on: ubuntu-latest
    name: "${{ matrix.check }}"

    strategy:
      matrix:
        include:
          - check: Composer Audit
            type: php
          - check: npm Audit
            type: node
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PHP CVE check
      - name: Setup PHP
        if: matrix.type == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install Composer dependencies
        if: matrix.type == 'php'
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Composer audit (high/critical)
        if: matrix.type == 'php'
        run: composer audit --format=plain --abandoned=report

      # npm CVE check
      - name: Setup Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        if: matrix.type == 'node'
        run: npm ci

      - name: npm audit (high/critical)
        if: matrix.type == 'node'
        run: npm audit --audit-level=high

  # ──────────────────────────────────────────────
  # Stage 1: PHP Linting — each tool as a separate box
  # ──────────────────────────────────────────────
  linting:
    runs-on: ubuntu-latest
    name: "${{ matrix.tool }}"

    strategy:
      matrix:
        include:
          - tool: PHP Lint
            command: composer lint
            enabled: true
          - tool: PHPCS
            command: composer phpcs
            enabled: true
          - tool: PHPMD
            command: composer phpmd
            enabled: true
          - tool: Psalm
            command: composer psalm
            enabled: ${{ inputs.enable-psalm }}
          - tool: PHPStan
            command: composer phpstan
            enabled: ${{ inputs.enable-phpstan }}
          - tool: phpmetrics
            command: composer phpmetrics
            enabled: ${{ inputs.enable-phpmetrics }}
        exclude:
          - enabled: false
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: "Run ${{ matrix.tool }}"
        run: ${{ matrix.command }}

  # ──────────────────────────────────────────────
  # Stage 1: Frontend quality checks
  # ──────────────────────────────────────────────
  frontend-quality:
    if: ${{ inputs.enable-frontend }}
    runs-on: ubuntu-latest
    name: "${{ matrix.tool }}"

    strategy:
      matrix:
        include:
          - tool: ESLint
            command: npm run lint
            enabled: ${{ inputs.enable-eslint }}
          - tool: Stylelint
            command: npm run stylelint
            enabled: true
        exclude:
          - enabled: false
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: "Run ${{ matrix.tool }}"
        run: ${{ matrix.command }}

  # ──────────────────────────────────────────────
  # Stage 2: PHPUnit tests (needs NC server)
  # Gated behind linting + CVE.
  # ──────────────────────────────────────────────
  php-tests:
    if: ${{ inputs.enable-phpunit }}
    runs-on: ubuntu-latest
    name: PHPUnit (PHP ${{ matrix.php-version }})
    needs: [linting, cve]

    strategy:
      matrix:
        php-version: ${{ fromJSON(inputs.php-test-versions) }}
      fail-fast: false

    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: ${{ inputs.nextcloud-ref }}
          path: server

      - name: Checkout server submodules
        run: |
          cd server
          git submodule update --init 3rdparty

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: server/apps/${{ inputs.app-name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, sqlite3, zip, gd, curl, xml, json
          coverage: xdebug
          tools: composer:v2

      - name: Install Nextcloud
        run: |
          cd server
          php occ maintenance:install \
            --database sqlite \
            --admin-user admin \
            --admin-pass admin
          php occ app:enable ${{ inputs.app-name }}
          chmod -R a+w config

      - name: Install app dependencies
        run: |
          cd server/apps/${{ inputs.app-name }}
          composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPUnit tests
        run: |
          cd server/apps/${{ inputs.app-name }}
          ./vendor/bin/phpunit \
            -c phpunit.xml \
            --colors=always \
            --coverage-clover=coverage/clover.xml

      - name: Guard coverage baseline
        if: inputs.enable-coverage-guard && matrix.php-version == inputs.php-version
        run: |
          cd server/apps/${{ inputs.app-name }}
          php scripts/coverage-guard.php coverage/clover.xml

      - name: Upload coverage artifact
        if: always() && matrix.php-version == inputs.php-version
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/apps/${{ inputs.app-name }}/coverage/
          retention-days: 14
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # Stage 2: Newman API tests (needs running NC)
  # Gated behind linting + CVE.
  # ──────────────────────────────────────────────
  integration-tests:
    if: ${{ inputs.enable-newman }}
    runs-on: ubuntu-latest
    name: Integration Tests (Newman)
    needs: [linting, cve]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nextcloud
          POSTGRES_PASSWORD: nextcloud
          POSTGRES_DB: nextcloud
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: ${{ inputs.nextcloud-ref }}
          path: server

      - name: Checkout server submodules
        run: |
          cd server
          git submodule update --init 3rdparty

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: server/apps/${{ inputs.app-name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, pgsql, pdo_pgsql, zip, gd, curl, xml, json
          tools: composer:v2

      - name: Install Nextcloud
        run: |
          cd server
          php occ maintenance:install \
            --database pgsql \
            --database-host 127.0.0.1 \
            --database-port 5432 \
            --database-name nextcloud \
            --database-user nextcloud \
            --database-pass nextcloud \
            --admin-user admin \
            --admin-pass admin

      - name: Install and enable app
        run: |
          cd server/apps/${{ inputs.app-name }}
          composer install --no-progress --prefer-dist --optimize-autoloader
          cd ../../
          php occ app:enable ${{ inputs.app-name }}

      - name: Start PHP built-in server
        run: |
          cd server
          php -S 0.0.0.0:8080 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/status.php || echo "Server not ready"

      - name: Setup Node.js and Newman
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Smoke test API
        run: |
          echo "=== Check app is enabled ==="
          cd server && php occ app:list --enabled | grep -i register || echo "App not listed"
          echo "=== Test register creation ==="
          curl -s -u admin:admin -X POST \
            -H "Content-Type: application/json" \
            -d '{"title":"smoke-test","description":"CI smoke test"}' \
            http://localhost:8080/index.php/apps/${{ inputs.app-name }}/api/registers | head -500
          echo ""

      - name: Run Newman tests
        run: |
          cd server/apps/${{ inputs.app-name }}/tests/integration
          newman run *.postman_collection.json \
            --env-var "base_url=http://localhost:8080" \
            --env-var "admin_user=admin" \
            --env-var "admin_password=admin" \
            --reporters cli

      - name: Show Nextcloud log on failure
        if: failure()
        run: |
          echo "=== Last 50 lines of Nextcloud log ==="
          tail -50 server/data/nextcloud.log 2>/dev/null | python3 -m json.tool --no-ensure-ascii 2>/dev/null || tail -50 server/data/nextcloud.log 2>/dev/null || echo "No log found"

  # ──────────────────────────────────────────────
  # Guard: Block PRs that manually edit .coverage-baseline
  # ──────────────────────────────────────────────
  baseline-protection:
    if: ${{ inputs.enable-coverage-guard && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    name: Coverage Baseline Protection

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for manual baseline changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^\.coverage-baseline$'; then
            echo "::error::Manual changes to .coverage-baseline are not allowed. The baseline is updated automatically when coverage improves."
            exit 1
          fi
          echo "No manual baseline changes detected."

  # ──────────────────────────────────────────────
  # Auto-update: Ratchet baseline on push to main/development
  # ──────────────────────────────────────────────
  update-baseline:
    if: ${{ inputs.enable-coverage-guard && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development') }}
    runs-on: ubuntu-latest
    name: Update Coverage Baseline
    needs: php-tests
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}

      - name: Update baseline if improved
        run: php scripts/coverage-guard.php coverage/clover.xml --update-baseline

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .coverage-baseline; then
            echo "Baseline unchanged, nothing to commit."
          else
            git add .coverage-baseline
            git commit -m "ci: update coverage baseline [skip ci]"
            git push
          fi

  # ──────────────────────────────────────────────
  # Summary: Report results
  # ──────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    name: Quality Summary
    needs: [cve, linting, frontend-quality, php-tests, integration-tests, baseline-protection]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "CVE Scan:${{ needs.cve.result }}" \
                       "Linting:${{ needs.linting.result }}" \
                       "Frontend:${{ needs.frontend-quality.result }}" \
                       "PHPUnit:${{ needs.php-tests.result }}" \
                       "Newman:${{ needs.integration-tests.result }}" \
                       "Coverage Baseline:${{ needs.baseline-protection.result }}"; do
            name="${check%%:*}"
            result="${check##*:}"
            case "$result" in
              success) icon="+" ;;
              skipped) icon="-" ;;
              *) icon="x" ;;
            esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'CVE Scan': '${{ needs.cve.result }}',
              'Linting': '${{ needs.linting.result }}',
              'Frontend': '${{ needs.frontend-quality.result }}',
              'PHPUnit Tests': '${{ needs.php-tests.result }}',
              'Integration Tests': '${{ needs.integration-tests.result }}',
              'Coverage Baseline': '${{ needs.baseline-protection.result }}'
            };

            const icon = (s) => s === 'success' ? 'PASS' : s === 'skipped' ? 'SKIP' : 'FAIL';

            let body = '## Quality Report\n\n';
            body += '| Check | Result |\n|-------|--------|\n';
            for (const [name, result] of Object.entries(jobs)) {
              body += `| ${name} | ${icon(result)} ${result} |\n`;
            }
            body += '\nSee [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
