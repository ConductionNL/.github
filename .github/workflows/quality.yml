name: Quality

on:
  workflow_call:
    inputs:
      app-name:
        description: "Nextcloud app ID (used for checkout path in NC server)"
        required: true
        type: string
      php-version:
        description: "Primary PHP version for linting"
        required: false
        type: string
        default: "8.3"
      php-test-versions:
        description: "JSON array of PHP versions for PHPUnit matrix"
        required: false
        type: string
        default: '["8.3", "8.4"]'
      nextcloud-test-refs:
        description: "JSON array of Nextcloud server branches for PHPUnit matrix"
        required: false
        type: string
        default: '["stable31", "stable32"]'
      enable-psalm:
        description: "Run Psalm static analysis"
        required: false
        type: boolean
        default: true
      enable-phpstan:
        description: "Run PHPStan static analysis"
        required: false
        type: boolean
        default: true
      enable-phpmd:
        description: "Run PHPMD mess detection"
        required: false
        type: boolean
        default: true
      enable-phpcs:
        description: "Run PHPCS code style checks"
        required: false
        type: boolean
        default: true
      enable-phpmetrics:
        description: "Run phpmetrics code metrics"
        required: false
        type: boolean
        default: true
      enable-frontend:
        description: "Run frontend quality checks (ESLint + Stylelint)"
        required: false
        type: boolean
        default: true
      enable-eslint:
        description: "Run ESLint (requires enable-frontend)"
        required: false
        type: boolean
        default: true
      enable-license-check:
        description: "Run dependency license compliance check (composer + npm)"
        required: false
        type: boolean
        default: true
      enable-phpunit:
        description: "Run PHPUnit tests against Nextcloud server"
        required: false
        type: boolean
        default: false
      enable-newman:
        description: "Run Newman integration tests against Nextcloud server"
        required: false
        type: boolean
        default: false
      newman-collection-path:
        description: "Path to Newman/Postman collection files (relative to app root)"
        required: false
        type: string
        default: "tests/integration"
      additional-apps:
        description: "JSON array of additional app repos to checkout and enable (e.g. '[{\"repo\":\"ConductionNL/openregister\",\"app\":\"openregister\"}]')"
        required: false
        type: string
        default: "[]"
      enable-coverage-guard:
        description: "Run coverage baseline guard and auto-update"
        required: false
        type: boolean
        default: false

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ╔══════════════════════════════════════════════╗
  # ║  STAGE 1 — Parallel quality gates            ║
  # ║  Four groups run simultaneously:              ║
  # ║  • PHP Quality   (lint, phpcs, phpmd, etc.)   ║
  # ║  • Vue Quality   (eslint, stylelint)          ║
  # ║  • Security      (composer audit, npm audit)  ║
  # ║  • License       (composer + npm licenses)    ║
  # ╚══════════════════════════════════════════════╝

  # ── PHP Quality ─────────────────────────────────
  php-lint:
    runs-on: ubuntu-latest
    name: "PHP Quality / Lint"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHP Lint
        run: composer lint

  php-phpcs:
    if: ${{ inputs.enable-phpcs }}
    runs-on: ubuntu-latest
    name: "PHP Quality / PHPCS"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPCS
        run: |
          # Exit code 0 = clean, 1 = warnings only, 2 = errors found.
          # We treat warnings as non-blocking (exit 1 → success).
          composer phpcs; RC=$?
          if [ "$RC" -eq 1 ]; then
            echo "::warning::PHPCS found warnings but no errors — passing."
            exit 0
          fi
          exit $RC

  php-phpmd:
    if: ${{ inputs.enable-phpmd }}
    runs-on: ubuntu-latest
    name: "PHP Quality / PHPMD"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPMD
        run: composer phpmd

  php-psalm:
    if: ${{ inputs.enable-psalm }}
    runs-on: ubuntu-latest
    name: "PHP Quality / Psalm"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run Psalm
        run: composer psalm

  php-phpstan:
    if: ${{ inputs.enable-phpstan }}
    runs-on: ubuntu-latest
    name: "PHP Quality / PHPStan"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPStan
        run: composer phpstan

  php-phpmetrics:
    if: ${{ inputs.enable-phpmetrics }}
    runs-on: ubuntu-latest
    name: "PHP Quality / phpmetrics"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Run phpmetrics
        run: composer phpmetrics

  # ── Vue Quality ─────────────────────────────────
  vue-eslint:
    if: ${{ inputs.enable-frontend && inputs.enable-eslint }}
    runs-on: ubuntu-latest
    name: "Vue Quality / ESLint"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  vue-stylelint:
    if: ${{ inputs.enable-frontend }}
    runs-on: ubuntu-latest
    name: "Vue Quality / Stylelint"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Stylelint
        run: npm run stylelint

  # ── Security ────────────────────────────────────
  security-composer:
    runs-on: ubuntu-latest
    name: "Security / Composer Audit"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      - name: Composer audit (high/critical)
        run: composer audit --format=plain --abandoned=report

  security-npm:
    runs-on: ubuntu-latest
    name: "Security / npm Audit"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install npm dependencies
        run: npm ci
      - name: npm audit (critical only)
        run: npm audit --audit-level=critical --omit=dev

  # ── License Compliance ──────────────────────────
  #
  # Checks dependencies against an allowlist of approved SPDX license
  # identifiers. Generates a full license report as a workflow artifact
  # for audit/compliance purposes.
  #
  # Configuration (optional files in your app repo root):
  #
  #   .license-allowlist.json
  #   ─────────────────────────────────────────────
  #   A JSON array of approved SPDX license identifiers. If this file is
  #   absent, the built-in default allowlist is used (see step below).
  #   Example:
  #     ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
  #      "LGPL-2.1-only", "LGPL-2.1-or-later", "LGPL-3.0-only",
  #      "LGPL-3.0-or-later", "EUPL-1.2", "AGPL-3.0-or-later",
  #      "GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only",
  #      "GPL-3.0-or-later", "MPL-2.0", "Unlicense", "0BSD",
  #      "CC0-1.0", "CC-BY-3.0", "CC-BY-4.0", "PSF-2.0",
  #      "Zlib", "BlueOak-1.0.0"]
  #
  #   .license-overrides.json
  #   ─────────────────────────────────────────────
  #   A JSON object to manually approve specific packages even if their
  #   license is not on the allowlist. Use this for packages where:
  #   - The license is valid but uses a non-standard SPDX string
  #   - Legal has explicitly approved a specific dependency
  #   - The package is dual-licensed and the checker picks the wrong one
  #
  #   Keys are package names (composer: "vendor/package", npm: "package-name").
  #   Values are a justification string (who approved it and when).
  #   Example:
  #     {
  #       "vendor/some-package": "Approved by legal (Jan de Vries) — 2026-03-14, dual-licensed MIT/proprietary, we use MIT terms",
  #       "some-npm-package": "License is 'Artistic-2.0', compatible with EUPL — approved 2026-03-01"
  #     }
  #
  # How it works:
  #   1. Extracts all dependency licenses from composer or npm
  #   2. For dual-licensed packages ("MIT OR Apache-2.0"), passes if ANY
  #      license in the OR expression is on the allowlist
  #   3. Checks each package against overrides first, then the allowlist
  #   4. Generates a markdown + JSON report uploaded as a workflow artifact
  #   5. Fails the workflow if any dependency has a disallowed license
  # ────────────────────────────────────────────────
  license-composer:
    if: ${{ inputs.enable-license-check }}
    runs-on: ubuntu-latest
    name: "License / Composer"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Check Composer licenses
        run: |
          set -euo pipefail

          # ── Default allowlist (EUPL-1.2 / AGPL-3.0 compatible) ──
          DEFAULT_ALLOWLIST='[
            "MIT", "ISC", "BSD-2-Clause", "BSD-3-Clause", "0BSD",
            "Apache-2.0",
            "LGPL-2.0-only", "LGPL-2.0-or-later",
            "LGPL-2.1-only", "LGPL-2.1-or-later",
            "LGPL-3.0-only", "LGPL-3.0-or-later",
            "GPL-2.0-only", "GPL-2.0-or-later",
            "GPL-3.0-only", "GPL-3.0-or-later",
            "AGPL-3.0-only", "AGPL-3.0-or-later",
            "EUPL-1.1", "EUPL-1.2",
            "MPL-2.0",
            "Unlicense", "CC0-1.0", "CC-BY-3.0", "CC-BY-4.0",
            "PSF-2.0", "Python-2.0", "Zlib", "BlueOak-1.0.0",
            "Artistic-2.0", "BSL-1.0", "WTFPL", "OSL-3.0"
          ]'

          if [ -f .license-allowlist.json ]; then
            ALLOWLIST=$(cat .license-allowlist.json)
            echo "Using project .license-allowlist.json"
          else
            ALLOWLIST="$DEFAULT_ALLOWLIST"
            echo "Using built-in default allowlist"
          fi

          if [ -f .license-overrides.json ]; then
            OVERRIDES=$(cat .license-overrides.json)
            echo "Loaded .license-overrides.json with $(echo "$OVERRIDES" | jq 'length') override(s)"
          else
            OVERRIDES='{}'
          fi

          mkdir -p license-report

          # Helper: check if a license string is allowed
          # Handles SPDX OR expressions and trailing "*" from license-checker
          check_license() {
            local license_str="$1"
            IFS='|' read -ra PARTS <<< "$(echo "$license_str" | sed 's/ OR /|/g; s/ or /|/g')"
            for part in "${PARTS[@]}"; do
              part=$(echo "$part" | sed 's/^ *//;s/ *$//' | sed 's/[()]//g' | sed 's/\*$//')
              if echo "$ALLOWLIST" | jq -e --arg l "$part" 'map(ascii_downcase) | index($l | ascii_downcase)' > /dev/null 2>&1; then
                return 0
              fi
            done
            return 1
          }

          VIOLATIONS=0
          REPORT_JSON='[]'

          echo ""
          echo "=== Checking Composer dependencies ==="
          COMPOSER_JSON=$(composer licenses --format=json 2>/dev/null || echo '{"dependencies":{}}')

          for pkg in $(echo "$COMPOSER_JSON" | jq -r '.dependencies | keys[]' 2>/dev/null); do
            license=$(echo "$COMPOSER_JSON" | jq -r --arg p "$pkg" '.dependencies[$p].license | join(" OR ")')
            version=$(echo "$COMPOSER_JSON" | jq -r --arg p "$pkg" '.dependencies[$p].version')

            override=$(echo "$OVERRIDES" | jq -r --arg p "$pkg" '.[$p] // empty')
            if [ -n "$override" ]; then
              status="approved-override"
              echo "  OVERRIDE: $pkg ($license) — $override"
            elif check_license "$license"; then
              status="approved"
            else
              status="DENIED"
              VIOLATIONS=$((VIOLATIONS + 1))
              echo "::error::Disallowed license: $pkg ($version) uses '$license'"
            fi

            REPORT_JSON=$(echo "$REPORT_JSON" | jq \
              --arg pkg "$pkg" --arg ver "$version" --arg lic "$license" \
              --arg st "$status" --arg ovr "${override:-}" \
              '. + [{"package": $pkg, "version": $ver, "license": $lic, "status": $st, "override": $ovr}]')
          done

          TOTAL=$(echo "$REPORT_JSON" | jq 'length')
          APPROVED=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "approved")] | length')
          OVERRIDDEN=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "approved-override")] | length')
          DENIED=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "DENIED")] | length')

          # Save JSON report
          echo "$REPORT_JSON" | jq '.' > license-report/composer-licenses.json

          # Generate Markdown report
          {
            echo "# Composer License Report"
            echo ""
            echo "**Generated:** $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "**Repository:** ${{ github.repository }}"
            echo "**Ref:** ${{ github.sha }}"
            echo ""
            echo "## Summary"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total dependencies | $TOTAL |"
            echo "| Approved (allowlist) | $APPROVED |"
            echo "| Approved (manual override) | $OVERRIDDEN |"
            echo "| **Denied** | **$DENIED** |"
            echo ""
            echo "## Dependencies"
            echo ""
            echo "| Package | Version | License | Status | Override |"
            echo "|---------|---------|---------|--------|----------|"
          } > license-report/composer-licenses.md

          echo "$REPORT_JSON" | jq -r '.[] | "| \(.package) | \(.version) | \(.license) | \(.status) | \(.override) |"' >> license-report/composer-licenses.md

          if [ "$DENIED" -gt 0 ]; then
            {
              echo ""
              echo "## Denied Dependencies"
              echo ""
              echo "| Package | License |"
              echo "|---------|---------|"
            } >> license-report/composer-licenses.md
            echo "$REPORT_JSON" | jq -r '.[] | select(.status == "DENIED") | "| \(.package) | \(.license) |"' >> license-report/composer-licenses.md
            {
              echo ""
              echo "### How to resolve"
              echo ""
              echo "1. Add the license SPDX identifier to \`.license-allowlist.json\` if the license is generally acceptable"
              echo "2. Add the specific package to \`.license-overrides.json\` with a justification if only this package is approved"
              echo ""
              echo "See the workflow comments in quality.yml for configuration details."
            } >> license-report/composer-licenses.md
          fi

          echo ""
          echo "════════════════════════════════════════"
          echo "Composer: $TOTAL total, $APPROVED approved, $OVERRIDDEN overridden, $DENIED denied"
          echo "════════════════════════════════════════"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS Composer dependency license(s) are not on the allowlist. Add them to .license-allowlist.json or .license-overrides.json"
            exit 1
          fi
          echo "All Composer dependency licenses are compliant."

      - name: Upload Composer license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report-composer
          path: license-report/
          retention-days: 90

  license-npm:
    if: ${{ inputs.enable-license-check }}
    runs-on: ubuntu-latest
    name: "License / npm"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install -g license-checker

      - name: Check npm licenses
        run: |
          set -euo pipefail

          DEFAULT_ALLOWLIST='[
            "MIT", "ISC", "BSD-2-Clause", "BSD-3-Clause", "0BSD",
            "Apache-2.0",
            "LGPL-2.0-only", "LGPL-2.0-or-later",
            "LGPL-2.1-only", "LGPL-2.1-or-later",
            "LGPL-3.0-only", "LGPL-3.0-or-later",
            "GPL-2.0-only", "GPL-2.0-or-later",
            "GPL-3.0-only", "GPL-3.0-or-later",
            "AGPL-3.0-only", "AGPL-3.0-or-later",
            "EUPL-1.1", "EUPL-1.2",
            "MPL-2.0",
            "Unlicense", "CC0-1.0", "CC-BY-3.0", "CC-BY-4.0",
            "PSF-2.0", "Python-2.0", "Zlib", "BlueOak-1.0.0",
            "Artistic-2.0", "BSL-1.0", "WTFPL", "OSL-3.0"
          ]'

          if [ -f .license-allowlist.json ]; then
            ALLOWLIST=$(cat .license-allowlist.json)
            echo "Using project .license-allowlist.json"
          else
            ALLOWLIST="$DEFAULT_ALLOWLIST"
            echo "Using built-in default allowlist"
          fi

          if [ -f .license-overrides.json ]; then
            OVERRIDES=$(cat .license-overrides.json)
            echo "Loaded .license-overrides.json with $(echo "$OVERRIDES" | jq 'length') override(s)"
          else
            OVERRIDES='{}'
          fi

          mkdir -p license-report

          # Helper: check if a license string is allowed
          # Handles SPDX OR expressions and trailing "*" from license-checker
          check_license() {
            local license_str="$1"
            IFS='|' read -ra PARTS <<< "$(echo "$license_str" | sed 's/ OR /|/g; s/ or /|/g')"
            for part in "${PARTS[@]}"; do
              part=$(echo "$part" | sed 's/^ *//;s/ *$//' | sed 's/[()]//g' | sed 's/\*$//')
              if echo "$ALLOWLIST" | jq -e --arg l "$part" 'map(ascii_downcase) | index($l | ascii_downcase)' > /dev/null 2>&1; then
                return 0
              fi
            done
            return 1
          }

          VIOLATIONS=0
          REPORT_JSON='[]'

          echo ""
          echo "=== Checking npm dependencies ==="
          NPM_JSON=$(license-checker --json --production 2>/dev/null || echo '{}')

          for pkg in $(echo "$NPM_JSON" | jq -r 'keys[]' 2>/dev/null); do
            license=$(echo "$NPM_JSON" | jq -r --arg p "$pkg" '.[$p].licenses // .[$p].license // "UNKNOWN"')
            pkg_name=$(echo "$pkg" | sed 's/@[^@]*$//')
            pkg_version=$(echo "$pkg" | grep -oP '@[^@]+$' | sed 's/^@//')

            override=$(echo "$OVERRIDES" | jq -r --arg p "$pkg_name" '.[$p] // empty')
            if [ -n "$override" ]; then
              status="approved-override"
              echo "  OVERRIDE: $pkg_name ($license) — $override"
            elif check_license "$license"; then
              status="approved"
            else
              status="DENIED"
              VIOLATIONS=$((VIOLATIONS + 1))
              echo "::error::Disallowed license: $pkg_name ($pkg_version) uses '$license'"
            fi

            REPORT_JSON=$(echo "$REPORT_JSON" | jq \
              --arg pkg "$pkg_name" --arg ver "$pkg_version" --arg lic "$license" \
              --arg st "$status" --arg ovr "${override:-}" \
              '. + [{"package": $pkg, "version": $ver, "license": $lic, "status": $st, "override": $ovr}]')
          done

          TOTAL=$(echo "$REPORT_JSON" | jq 'length')
          APPROVED=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "approved")] | length')
          OVERRIDDEN=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "approved-override")] | length')
          DENIED=$(echo "$REPORT_JSON" | jq '[.[] | select(.status == "DENIED")] | length')

          echo "$REPORT_JSON" | jq '.' > license-report/npm-licenses.json

          {
            echo "# npm License Report"
            echo ""
            echo "**Generated:** $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "**Repository:** ${{ github.repository }}"
            echo "**Ref:** ${{ github.sha }}"
            echo ""
            echo "## Summary"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total dependencies | $TOTAL |"
            echo "| Approved (allowlist) | $APPROVED |"
            echo "| Approved (manual override) | $OVERRIDDEN |"
            echo "| **Denied** | **$DENIED** |"
            echo ""
            echo "## Dependencies"
            echo ""
            echo "| Package | Version | License | Status | Override |"
            echo "|---------|---------|---------|--------|----------|"
          } > license-report/npm-licenses.md

          echo "$REPORT_JSON" | jq -r '.[] | "| \(.package) | \(.version) | \(.license) | \(.status) | \(.override) |"' >> license-report/npm-licenses.md

          if [ "$DENIED" -gt 0 ]; then
            {
              echo ""
              echo "## Denied Dependencies"
              echo ""
              echo "| Package | License |"
              echo "|---------|---------|"
            } >> license-report/npm-licenses.md
            echo "$REPORT_JSON" | jq -r '.[] | select(.status == "DENIED") | "| \(.package) | \(.license) |"' >> license-report/npm-licenses.md
            {
              echo ""
              echo "### How to resolve"
              echo ""
              echo "1. Add the license SPDX identifier to \`.license-allowlist.json\` if the license is generally acceptable"
              echo "2. Add the specific package to \`.license-overrides.json\` with a justification if only this package is approved"
              echo ""
              echo "See the workflow comments in quality.yml for configuration details."
            } >> license-report/npm-licenses.md
          fi

          echo ""
          echo "════════════════════════════════════════"
          echo "npm: $TOTAL total, $APPROVED approved, $OVERRIDDEN overridden, $DENIED denied"
          echo "════════════════════════════════════════"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS npm dependency license(s) are not on the allowlist. Add them to .license-allowlist.json or .license-overrides.json"
            exit 1
          fi
          echo "All npm dependency licenses are compliant."

      - name: Upload npm license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report-npm
          path: license-report/
          retention-days: 90

  # ╔══════════════════════════════════════════════╗
  # ║  STAGE 2 — Tests (gated behind Stage 1)      ║
  # ║  • PHPUnit matrix (PHP × Nextcloud versions)  ║
  # ║  • Integration tests (Newman)                 ║
  # ╚══════════════════════════════════════════════╝

  phpunit:
    if: ${{ inputs.enable-phpunit && !cancelled() && needs.php-lint.result != 'failure' && (needs.php-phpcs.result == 'success' || needs.php-phpcs.result == 'skipped') && needs.security-composer.result != 'failure' && needs.security-npm.result != 'failure' && (needs.php-phpmd.result == 'success' || needs.php-phpmd.result == 'skipped') }}
    runs-on: ubuntu-latest
    name: "Tests / PHPUnit (PHP ${{ matrix.php-version }}, NC ${{ matrix.nextcloud-ref }})"
    needs: [php-lint, php-phpcs, php-phpmd, security-composer, security-npm]

    strategy:
      matrix:
        php-version: ${{ fromJSON(inputs.php-test-versions) }}
        nextcloud-ref: ${{ fromJSON(inputs.nextcloud-test-refs) }}
      fail-fast: false

    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: ${{ matrix.nextcloud-ref }}
          path: server

      - name: Checkout server submodules
        run: |
          cd server
          git submodule update --init 3rdparty

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: server/apps/${{ inputs.app-name }}

      - name: Checkout additional apps
        if: ${{ inputs.additional-apps != '[]' }}
        run: |
          echo '${{ inputs.additional-apps }}' | jq -c '.[]' | while read -r app; do
            repo=$(echo "$app" | jq -r '.repo')
            name=$(echo "$app" | jq -r '.app')
            ref=$(echo "$app" | jq -r '.ref // "main"')
            echo "Checking out $repo ($name) at $ref..."
            git clone --depth 1 --branch "$ref" "https://github.com/$repo.git" "server/apps/$name"
            if [ -f "server/apps/$name/composer.json" ]; then
              cd "server/apps/$name"
              composer install --no-progress --prefer-dist --optimize-autoloader --no-dev 2>/dev/null || true
              cd -
            fi
          done

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, sqlite3, zip, gd, curl, xml, json
          coverage: xdebug
          tools: composer:v2

      - name: Install Nextcloud
        run: |
          cd server
          php occ maintenance:install \
            --database sqlite \
            --admin-user admin \
            --admin-pass admin
          # Enable additional apps first (dependencies)
          if [ '${{ inputs.additional-apps }}' != '[]' ]; then
            echo '${{ inputs.additional-apps }}' | jq -r '.[].app' | while read -r name; do
              echo "Enabling app: $name"
              php occ app:enable "$name" || echo "::warning::Failed to enable $name, continuing..."
            done
          fi
          php occ app:enable ${{ inputs.app-name }}
          chmod -R a+w config

      - name: Install app dependencies
        run: |
          cd server/apps/${{ inputs.app-name }}
          composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Validate test infrastructure
        run: |
          cd server/apps/${{ inputs.app-name }}
          if [ ! -f phpunit.xml ] && [ ! -f phpunit-unit.xml ]; then
            echo "::error::PHPUnit is enabled but no phpunit.xml or phpunit-unit.xml found."
            exit 1
          fi
          if [ ! -d tests/Unit ] && [ ! -d tests/unit ] && [ ! -d tests/Service ] && [ ! -d tests/Integration ] && [ ! -d tests/integration ]; then
            echo "::error::PHPUnit is enabled but no test directories found."
            exit 1
          fi
          echo "PHPUnit infrastructure validated."

      - name: Run PHPUnit tests
        run: |
          cd server/apps/${{ inputs.app-name }}
          ./vendor/bin/phpunit \
            -c phpunit.xml \
            --colors=always \
            --coverage-clover=coverage/clover.xml

      - name: Guard coverage baseline
        if: inputs.enable-coverage-guard && matrix.php-version == inputs.php-version && matrix.nextcloud-ref == fromJSON(inputs.nextcloud-test-refs)[0]
        run: |
          cd server/apps/${{ inputs.app-name }}
          php scripts/coverage-guard.php coverage/clover.xml

      - name: Upload coverage artifact
        if: always() && matrix.php-version == inputs.php-version && matrix.nextcloud-ref == fromJSON(inputs.nextcloud-test-refs)[0]
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/apps/${{ inputs.app-name }}/coverage/
          retention-days: 14
          if-no-files-found: ignore

  newman:
    if: ${{ inputs.enable-newman && !cancelled() && needs.php-lint.result != 'failure' && (needs.php-phpcs.result == 'success' || needs.php-phpcs.result == 'skipped') && needs.security-composer.result != 'failure' && needs.security-npm.result != 'failure' && (needs.php-phpmd.result == 'success' || needs.php-phpmd.result == 'skipped') }}
    runs-on: ubuntu-latest
    name: "Tests / Integration (Newman)"
    needs: [php-lint, php-phpcs, php-phpmd, security-composer, security-npm]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nextcloud
          POSTGRES_PASSWORD: nextcloud
          POSTGRES_DB: nextcloud
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: ${{ fromJSON(inputs.nextcloud-test-refs)[0] }}
          path: server

      - name: Checkout server submodules
        run: |
          cd server
          git submodule update --init 3rdparty

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: server/apps/${{ inputs.app-name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, intl, pgsql, pdo_pgsql, zip, gd, curl, xml, json
          tools: composer:v2

      - name: Install Nextcloud
        run: |
          cd server
          php occ maintenance:install \
            --database pgsql \
            --database-host 127.0.0.1 \
            --database-port 5432 \
            --database-name nextcloud \
            --database-user nextcloud \
            --database-pass nextcloud \
            --admin-user admin \
            --admin-pass admin

      - name: Install and enable app
        run: |
          cd server/apps/${{ inputs.app-name }}
          composer install --no-progress --prefer-dist --optimize-autoloader
          cd ../../
          php occ app:enable ${{ inputs.app-name }}

      - name: Start PHP built-in server
        run: |
          cd server
          php -S 0.0.0.0:8080 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/status.php || echo "Server not ready"

      - name: Setup Node.js and Newman
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Validate Newman collections
        run: |
          cd server/apps/${{ inputs.app-name }}
          COLLECTION_PATH="${{ inputs.newman-collection-path }}"
          if [ ! -d "$COLLECTION_PATH" ]; then
            echo "::error::Newman is enabled but collection directory '$COLLECTION_PATH' does not exist."
            exit 1
          fi
          COLLECTIONS=$(find "$COLLECTION_PATH" -name "*.postman_collection.json" 2>/dev/null | wc -l)
          if [ "$COLLECTIONS" -eq 0 ]; then
            echo "::error::No .postman_collection.json files found in '$COLLECTION_PATH'."
            exit 1
          fi
          echo "Found $COLLECTIONS Postman collection(s) in $COLLECTION_PATH."

      - name: Run Newman tests
        run: |
          cd server/apps/${{ inputs.app-name }}/${{ inputs.newman-collection-path }}
          FAIL=0
          for collection in *.postman_collection.json; do
            echo ""
            echo "=== Running: $collection ==="
            newman run "$collection" \
              --env-var "base_url=http://localhost:8080" \
              --env-var "admin_user=admin" \
              --env-var "admin_password=admin" \
              --reporters cli || FAIL=1
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more Newman collections failed."
            exit 1
          fi

      - name: Show Nextcloud log on failure
        if: failure()
        run: |
          echo "=== Last 50 lines of Nextcloud log ==="
          tail -50 server/data/nextcloud.log 2>/dev/null | python3 -m json.tool --no-ensure-ascii 2>/dev/null || tail -50 server/data/nextcloud.log 2>/dev/null || echo "No log found"

  # ╔══════════════════════════════════════════════╗
  # ║  STAGE 3 — Reporting & coverage baseline      ║
  # ╚══════════════════════════════════════════════╝

  baseline-protection:
    if: ${{ inputs.enable-coverage-guard && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    name: "Reporting / Coverage Baseline Protection"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for manual baseline changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^\.coverage-baseline$'; then
            echo "::error::Manual changes to .coverage-baseline are not allowed."
            exit 1
          fi
          echo "No manual baseline changes detected."

  update-baseline:
    if: ${{ inputs.enable-coverage-guard && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development') }}
    runs-on: ubuntu-latest
    name: "Reporting / Update Coverage Baseline"
    needs: phpunit
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}

      - name: Update baseline if improved
        run: php scripts/coverage-guard.php coverage/clover.xml --update-baseline

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .coverage-baseline; then
            echo "Baseline unchanged, nothing to commit."
          else
            git add .coverage-baseline
            git commit -m "ci: update coverage baseline [skip ci]"
            git push
          fi

  summary:
    runs-on: ubuntu-latest
    name: "Reporting / Quality Summary"
    needs:
      # Stage 1: PHP Quality
      - php-lint
      - php-phpcs
      - php-phpmd
      - php-psalm
      - php-phpstan
      - php-phpmetrics
      # Stage 1: Vue Quality
      - vue-eslint
      - vue-stylelint
      # Stage 1: Security
      - security-composer
      - security-npm
      # Stage 1: License
      - license-composer
      - license-npm
      # Stage 2: Tests
      - phpunit
      - newman
      # Stage 3: Coverage
      - baseline-protection
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### PHP Quality" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "PHP Lint:${{ needs.php-lint.result }}" \
                       "PHPCS:${{ needs.php-phpcs.result }}" \
                       "PHPMD:${{ needs.php-phpmd.result }}" \
                       "Psalm:${{ needs.php-psalm.result }}" \
                       "PHPStan:${{ needs.php-phpstan.result }}" \
                       "phpmetrics:${{ needs.php-phpmetrics.result }}"; do
            name="${check%%:*}"; result="${check##*:}"
            case "$result" in success) icon="+" ;; skipped) icon="-" ;; *) icon="x" ;; esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vue Quality" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "ESLint:${{ needs.vue-eslint.result }}" \
                       "Stylelint:${{ needs.vue-stylelint.result }}"; do
            name="${check%%:*}"; result="${check##*:}"
            case "$result" in success) icon="+" ;; skipped) icon="-" ;; *) icon="x" ;; esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "Composer Audit:${{ needs.security-composer.result }}" \
                       "npm Audit:${{ needs.security-npm.result }}"; do
            name="${check%%:*}"; result="${check##*:}"
            case "$result" in success) icon="+" ;; skipped) icon="-" ;; *) icon="x" ;; esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### License Compliance" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "Composer Licenses:${{ needs.license-composer.result }}" \
                       "npm Licenses:${{ needs.license-npm.result }}"; do
            name="${check%%:*}"; result="${check##*:}"
            case "$result" in success) icon="+" ;; skipped) icon="-" ;; *) icon="x" ;; esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in "PHPUnit:${{ needs.phpunit.result }}" \
                       "Newman:${{ needs.newman.result }}" \
                       "Coverage Baseline:${{ needs.baseline-protection.result }}"; do
            name="${check%%:*}"; result="${check##*:}"
            case "$result" in success) icon="+" ;; skipped) icon="-" ;; *) icon="x" ;; esac
            echo "| $name | $icon $result |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const sections = {
              'PHP Quality': {
                'PHP Lint': '${{ needs.php-lint.result }}',
                'PHPCS': '${{ needs.php-phpcs.result }}',
                'PHPMD': '${{ needs.php-phpmd.result }}',
                'Psalm': '${{ needs.php-psalm.result }}',
                'PHPStan': '${{ needs.php-phpstan.result }}',
                'phpmetrics': '${{ needs.php-phpmetrics.result }}'
              },
              'Vue Quality': {
                'ESLint': '${{ needs.vue-eslint.result }}',
                'Stylelint': '${{ needs.vue-stylelint.result }}'
              },
              'Security': {
                'Composer Audit': '${{ needs.security-composer.result }}',
                'npm Audit': '${{ needs.security-npm.result }}'
              },
              'License Compliance': {
                'Composer Licenses': '${{ needs.license-composer.result }}',
                'npm Licenses': '${{ needs.license-npm.result }}'
              },
              'Tests': {
                'PHPUnit': '${{ needs.phpunit.result }}',
                'Newman': '${{ needs.newman.result }}',
                'Coverage Baseline': '${{ needs.baseline-protection.result }}'
              }
            };

            const icon = (s) => s === 'success' ? 'PASS' : s === 'skipped' ? 'SKIP' : 'FAIL';

            let body = '## Quality Report\n\n';
            for (const [section, jobs] of Object.entries(sections)) {
              body += `### ${section}\n\n`;
              body += '| Check | Result |\n|-------|--------|\n';
              for (const [name, result] of Object.entries(jobs)) {
                body += `| ${name} | ${icon(result)} ${result} |\n`;
              }
              body += '\n';
            }
            body += `See [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
