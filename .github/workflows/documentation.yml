name: Documentation

on:
  workflow_call:
    inputs:
      cname:
        description: "Custom domain for GitHub Pages (e.g. 'pipelinq.app')"
        required: true
        type: string
      source-folder:
        description: "Folder containing the Docusaurus project"
        required: false
        type: string
        default: "docs"
      node-version:
        description: "Node.js version for building"
        required: false
        type: string
        default: "20"

# Two jobs so the AI-baseline validation gate runs on every event,
# including pull_request, while the actual gh-pages deploy stays
# gated to push / schedule / workflow_dispatch. Sites that ship the
# postbuild validator from @conduction/docusaurus-preset (robots.txt,
# llms.txt, sitemaps, JSON-LD, FAQPage, og:image, etc.) get PR-time
# enforcement of the contract automatically.

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      built: ${{ steps.flag.outputs.built }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies and build
        timeout-minutes: 10
        env:
          # Pass the run-scoped token through so npm prebuild scripts
          # that hit the GitHub API (e.g. conduction-website's nightly
          # app-downloads fetch) authenticate and avoid 60-req/hr rate
          # limits. Token is auto-scoped to the run, expires when the
          # job ends.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ inputs.source-folder }}
          rm -rf node_modules/.cache .docusaurus build
          npm run ci

      - name: Verify build output
        run: |
          if [ ! -f "${{ inputs.source-folder }}/build/index.html" ]; then
            echo "ERROR: index.html not found in build directory!"
            exit 1
          fi

      - name: Upload build artifact for deploy job
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: ${{ inputs.source-folder }}/build
          retention-days: 1

      - id: flag
        run: echo "built=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy Documentation
    needs: build
    runs-on: ubuntu-latest
    # Deploy only on direct pushes, scheduled rebuilds, and manual
    # workflow_dispatch. PR runs stop after the build job, so the
    # AI-baseline gate runs but no gh-pages push happens.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: ${{ inputs.source-folder }}/build

      - name: Create .nojekyll and CNAME files
        run: |
          cd ${{ inputs.source-folder }}/build
          touch .nojekyll
          echo "${{ inputs.cname }}" > CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ inputs.source-folder }}/build
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: false
          allow_empty_commit: true
          keep_files: false

      - name: Verify deployment
        run: |
          git fetch origin gh-pages
          echo "Deployment completed. Latest commit: $(git rev-parse origin/gh-pages)"
