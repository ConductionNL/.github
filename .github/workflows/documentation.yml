name: Documentation

on:
  workflow_call:
    inputs:
      cname:
        description: "Custom domain for GitHub Pages (e.g. 'pipelinq.app')"
        required: true
        type: string
      source-folder:
        description: "Folder containing the Docusaurus project"
        required: false
        type: string
        default: "docs"
      node-version:
        description: "Node.js version for building"
        required: false
        type: string
        default: "20"

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies and build
        timeout-minutes: 5
        run: |
          cd ${{ inputs.source-folder }}
          rm -rf node_modules/.cache .docusaurus build
          npm run ci

      - name: Verify build output
        run: |
          if [ ! -f "${{ inputs.source-folder }}/build/index.html" ]; then
            echo "ERROR: index.html not found in build directory!"
            exit 1
          fi

      - name: Create .nojekyll and CNAME files
        run: |
          cd ${{ inputs.source-folder }}/build
          touch .nojekyll
          echo "${{ inputs.cname }}" > CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ inputs.source-folder }}/build
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: false
          allow_empty_commit: true
          keep_files: false

      - name: Verify deployment
        run: |
          git fetch origin gh-pages
          echo "Deployment completed. Latest commit: $(git rev-parse origin/gh-pages)"

      - name: Trigger Algolia crawler reindex
        continue-on-error: true
        run: |
          curl -X POST \
            --fail \
            --user "${{ secrets.ALGOLIA_CRAWLER_ID }}:${{ secrets.ALGOLIA_CRAWLER_SECRET }}" \
            "https://crawler.algolia.com/api/1/crawlers/${{ secrets.ALGOLIA_CRAWLER_ID }}/reindex"
